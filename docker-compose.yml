version: '3.8'

services:

  db:
    image: mysql:8.0
    container_name: airbnb_db
    environment:
      MYSQL_ROOT_PASSWORD: airbnb123
      MYSQL_DATABASE: airbnb_expert
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: .
    container_name: airbnb_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: airbnb_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    env_file:
      - .env
    volumes:
      - .:/app

volumes:
  mysql_data: